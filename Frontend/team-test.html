<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Team Formation</title>

<style>
body{
  font-family:'Segoe UI';
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  padding:30px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:15px;
  margin-top:20px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#00d4ff;
  font-weight:bold;
  cursor:pointer;
}

.member{
  background:rgba(255,255,255,0.1);
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h1>🚀 AI Team Formation</h1>

<!-- MANUAL ADD -->
<div class="card">
<h3>Add Employee Manually</h3>

<input id="name" placeholder="Name">
<input id="skills" placeholder="Skills (java,react)">
<input id="exp" placeholder="Experience">
<input id="comm" placeholder="Communication (1-10)">

<button onclick="addEmployee()">Add Employee</button>
</div>

<!-- CSV -->
<div class="card">
<h3>Upload CSV</h3>
<input type="file" id="csvFile">
<button onclick="importCSV()">Upload CSV</button>
</div>

<!-- GENERATE -->
<div class="card">
<h3>Generate Team</h3>
<button onclick="generateTeam()">Generate AI Team</button>

<div id="teamResult"></div>
</div>

</div>

<script>

// LOAD
let employees = JSON.parse(localStorage.getItem("employees")) || [];

// SAVE
function save(){
  localStorage.setItem("employees", JSON.stringify(employees));
}

// MANUAL ADD
function addEmployee(){

  let emp = {
    name: document.getElementById("name").value,
    skills: document.getElementById("skills").value.toLowerCase(),
    experience: parseFloat(document.getElementById("exp").value)||0,
    communication: parseFloat(document.getElementById("comm").value)||5
  };

  employees.push(emp);
  save();

  alert("Employee Added ✅");

  document.getElementById("name").value="";
  document.getElementById("skills").value="";
  document.getElementById("exp").value="";
  document.getElementById("comm").value="";
}

// CSV IMPORT
function importCSV(){

  let file = document.getElementById("csvFile").files[0];
  if(!file) return alert("Select CSV");

  let reader = new FileReader();

  reader.onload = function(e){
    let rows = e.target.result.split("\n");

    for(let i=1;i<rows.length;i++){
      let col = rows[i].split(",");

      if(col.length>5){
        employees.push({
          name: col[1],
          skills: col[6]?.toLowerCase().replace(/\|/g,","),
          experience: parseFloat(col[5])||0,
          communication: parseFloat(col[9])||5
        });
      }
    }

    save();
    alert("CSV Loaded ✅");
  };

  reader.readAsText(file);
}

// GENERATE TEAM
function generateTeam(){

  if(employees.length===0){
    alert("No employees ❌");
    return;
  }

  let team=[];

  // LEADER
  let leader = employees.sort((a,b)=>b.communication-a.communication)[0];
  team.push({...leader,role:"Leader"});

  // SENIOR
  let seniors = employees.filter(e=>e.experience>=5 && e.name!==leader.name);
  team.push(...seniors.slice(0,2).map(e=>({...e,role:"Senior"})));

  // JUNIOR
  let juniors = employees.filter(e=>e.experience>=2 && e.experience<5);
  team.push(...juniors.slice(0,2).map(e=>({...e,role:"Junior"})));

  displayTeam(team);
}

// DISPLAY
function displayTeam(team){

  let container = document.getElementById("teamResult");
  container.innerHTML="<h3>🔥 Team</h3>";

  team.forEach(e=>{
    let div=document.createElement("div");
    div.className="member";

    div.innerHTML=`
      <b>${e.name}</b> (${e.role})<br>
      Skills: ${e.skills}<br>
      Exp: ${e.experience} | Comm: ${e.communication}
    `;

    container.appendChild(div);
  });
}

</script>

</body>
</html>
